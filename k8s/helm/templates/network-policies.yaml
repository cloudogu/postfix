{{- if .Values.networkPolicies.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "postfix.name" . }}-deny-all
  labels:
    {{ include "postfix.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{ include "postfix.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress: []
{{- end }}