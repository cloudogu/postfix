apiVersion: v1
kind: Service
metadata:
  name: {{ include "postfix.name" . }}
  labels:
    {{ include "postfix.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{ include "postfix.selectorLabels" . | nindent 4 }}
  ports:
    {{- range $name, $value := .Values.service.ports }}
    - name: {{ $name | quote }}
      {{ toYaml $value | nindent 6 }}
    {{- end }}