apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "postfix.name" . }}
  labels:
    control-plane: controller-manager
    {{ include "postfix.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas | default 1 }}
  selector:
    matchLabels:
      {{ include "postfix.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: cas
      labels:
        {{ include "postfix.labels" . | nindent 8 }}
    spec:
      containers:
        - env:
          - name: POD_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: ECOSYSTEM_MULTINODE
            value: "true"
          - name: RUNTIME_MODE
            value: "component"
          - name: LDAP_PASSWORD
            valueFrom:
              secretKeyRef: {{ toYaml .Values.configuration.secretRefs.ldapPassword | nindent 16 }}
          - name: LDAP_USERNAME
            valueFrom:
              secretKeyRef: {{ toYaml .Values.configuration.secretRefs.ldapUsername | nindent 16 }}
          - name: OIDC_CLIENT_SECRET
            valueFrom:
              secretKeyRef: {{ toYaml .Values.configuration.secretRefs.oidcClientSecret | nindent 16 }}
          image: "{{ .Values.containers.cas.image.registry }}{{ if .Values.containers.cas.image.registry }}/{{ end }}{{ .Values.containers.cas.image.repository }}:{{ .Values.containers.cas.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.containers.cas.imagePullPolicy }}
          livenessProbe:
            failureThreshold: 180
            periodSeconds: 10
            successThreshold: 1
            tcpSocket:
              port: 8080
            timeoutSeconds: 1
          name: cas
          resources:
            limits: {{ toYaml .Values.resourceLimits | nindent 14 }}
            requests: {{ toYaml .Values.resourceRequests | nindent 14 }}
          securityContext: {{ toYaml .Values.containers.cas.securityContext | nindent 12 }}
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - '[ $(doguctl state) == "ready" ]'
            failureThreshold: 180
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          volumeMounts:
            - mountPath: /var/ces/state
              name: postfix-ephemeral
              subPath: state
            - mountPath: /etc/ces/config
              name: ces-config
              readOnly: true
            - mountPath: /etc/ces/dogu_json/postfix
              name: postfix-dogu-json
              readOnly: true
      enableServiceLinks: false
      hostname: postfix
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{ toYaml . | nindent 8 }}
      {{- end }}
      securityContext: {{ toYaml .Values.securityContext | nindent 8 }}
      volumes:
        - emptyDir: { }
          name: postfix-ephemeral
        - name: ces-config
          projected:
            sources:
              - configMap:
                  name: {{ .Values.configuration.meta.global.name }}
                  items:
                    - key: {{ .Values.configuration.meta.global.key }}
                      path: global/config.yaml
              - configMap:
                  name: {{ include "postfix.name" . }}-config
                  items:
                    - key: {{ .Values.configuration.meta.normal.key }}
                      path: normal/config.yaml
                    - key: {{ .Values.configuration.meta.sensitive.key }}
                      path: sensitive/config.yaml
        - configMap:
            name: component-spec-{{ include "postfix.name" . }}
          name: postfix-dogu-json